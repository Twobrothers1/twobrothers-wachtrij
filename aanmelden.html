<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Two Brothers Barbershop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#111;
font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

color:white;

}

.box{

width:100%;
max-width:430px;

background:#1b1b1b;

border:2px solid #d4af37;

border-radius:16px;

padding:30px;

}

#logo{

display:block;

width:420px;

max-width:95%;

margin:0 auto 25px;

}

h1{

text-align:center;

color:#d4af37;

margin-bottom:25px;

font-size:28px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:8px;

font-size:16px;

outline:none;

}

button{

width:100%;

padding:15px;

background:#d4af37;

border:none;

border-radius:8px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

button:hover{

opacity:.9;

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

#melding{

margin-top:20px;

text-align:center;

}

.infoBox{

margin-top:20px;

background:#2a2415;

border:1px solid #d4af37;

border-radius:10px;

padding:15px;

line-height:1.6;

font-size:15px;

}

.infoBox b{

color:#d4af37;

}

</style>

</head>

<body>

<div class="box">

<img
id="logo"
src="https://twobrothers1.github.io/twobrothers-wachtrij/twobrothers-logo.png"
alt="Two Brothers">

<h1>Meld je aan voor de wachtrij</h1>

<input
id="naam"
placeholder="Naam">

<input
id="email"
type="email"
placeholder="E-mailadres">

<button
id="btn">

Aanmelden

</button>

<div id="melding"></div>

<div class="infoBox">
<p style="margin-top:15px; color:#f0c040; font-size:14px; text-align:center; font-weight:bold;">
  ⚠️ Vergeet niet je spam-/ongewenste e-mail te controleren.
</p>
<b>📧 Wacht op onze e-mail</b>

<br><br>

Zodra je de e-mail
<b>'Bijna aan de beurt'</b>
ontvangt,
kom je direct naar de
barbershop.

<br><br>

<b>⚠️ Belangrijk</b>

<br>

Kom je niet direct,
dan is de kans groot
dat je je beurt mist.

</div>

</div>
<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwUQI6FLd10U8oW8Jew-WkhWjkds5Rkl9CRMWnh6i8Ruj2dkgaC6WjSaq2XnRo0IdyQHQ/exec";

document.getElementById("btn").addEventListener("click", aanmelden);

async function aanmelden(){

  const naam = document.getElementById("naam").value.trim();
  const email = document.getElementById("email").value.trim();
  const melding = document.getElementById("melding");

  if(!naam || !email){
    melding.innerHTML = "Vul alle velden in.";
    return;
  }

  melding.innerHTML = "Aanmelden...";

  const data = new FormData();
  data.append("naam", naam);
  data.append("email", email);

  try{

    const response = await fetch(API_URL,{
      method:"POST",
      body:data
    });

    const resultaat = await response.json();

    if(resultaat.success){

      melding.innerHTML = `
      <div style="color:#6CFF6C;font-size:22px;font-weight:bold;margin-bottom:15px;">
      ✅ Je bent succesvol aangemeld!
      </div>

      <div style="font-size:18px;color:white;margin-bottom:20px;">
      Er staan momenteel <b style="color:#d4af37;">${resultaat.wachtenden}</b> klanten voor je.
      </div>
      `;

      document.getElementById("naam").value = "";
      document.getElementById("email").value = "";

    }else{

      melding.innerHTML = `
      <div class="infoBox">
      ⚠️ ${resultaat.message}
      </div>
      `;
    }

  }catch(err){

    console.error(err);

    melding.innerHTML = `
    <div class="infoBox">
    ❌ Er is een fout opgetreden.
    </div>
    `;
  }
}

</script>
</body>
</html>
