<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test</title>
</head>
<body>

<input id="naam" placeholder="Naam"><br><br>

<input id="email" placeholder="Email"><br><br>

<button onclick="test()">Aanmelden</button>

<div id="melding"></div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwUQI6FLd10U8oW8Jew-WkhWjkds5Rkl9CRMWnh6i8Ruj2dkgaC6WjSaq2XnRo0IdyQHQ/exec";

async function test(){

const fd=new FormData();

fd.append("naam",document.getElementById("naam").value);
fd.append("email",document.getElementById("email").value);

const r=await fetch(API_URL,{
method:"POST",
body:fd
});

const data=await r.json();

document.getElementById("melding").innerHTML=
JSON.stringify(data);

}

</script>

</body>
</html>
