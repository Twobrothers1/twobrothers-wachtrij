<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Brothers Barbershop</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

h1{
    margin-top:35px;
    color:#d4af37;
}

h2{
    color:white;
    margin-bottom:30px;
}

.klant{
    background:#222;
    border:1px solid #d4af37;
    border-radius:15px;
    width:85%;
    max-width:500px;
    margin:15px auto;
    padding:18px;
    font-size:24px;
    color:#d4af37;
}

.wordtgeknipt{
    color:#35d06e;
    font-weight:bold;
    font-size:20px;
}

.info{
    color:#999;
    margin-top:40px;
}
}
</style>
</head>

<body>

<h1>TWO BROTHERS BARBERSHOP</h1>
<h2>⏳ Momenteel wachtend</h2>

<div id="lijst">
    <div class="info">Laden...</div>
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwUQI6FLd10U8oW8Jew-WkhWjkds5Rkl9CRMWnh6i8Ruj2dkgaC6WjSaq2XnRo0IdyQHQ/exec";

document.getElementById("btn").onclick = aanmelden;

async function aanmelden(){

const btn=document.getElementById("btn");
const melding=document.getElementById("melding");

const naam=document.getElementById("naam").value.trim();
const email=document.getElementById("email").value.trim();

if(!naam || !email){

melding.innerHTML="Vul alle velden in.";

return;

}

btn.disabled=true;

btn.innerHTML="Aanmelden...";

melding.innerHTML="";

const formData=new FormData();

formData.append("naam",naam);
formData.append("email",email);

try{

const response=await fetch(API_URL,{

method:"POST",

body:formData

});

const data=await response.json();

if(data.success){

melding.innerHTML=`
<div style="color:#6CFF6C;font-size:22px;font-weight:bold;margin-bottom:15px;">
✅ Je bent succesvol aangemeld!
</div>

<div style="font-size:18px;color:white;margin-bottom:20px;">
Er staan momenteel
<b style="color:#d4af37;">${data.wachtenden}</b>
klanten voor je.
</div>

<div class="infoBox">

<b>📧 Wacht op onze e-mail</b>

<br><br>

Zodra je de e-mail
<b>'Bijna aan de beurt'</b>
ontvangt,
kom je direct naar de barbershop.

<br><br>

⚠️ <b>Belangrijk:</b><br>

Kom je niet direct,
dan is de kans groot
dat je je beurt mist.

</div>
`;

document.getElementById("naam").value="";
document.getElementById("email").value="";

}else{

melding.innerHTML=`
<div class="infoBox">
<b>⚠️ ${data.message}</b>
</div>
`;

}

}catch(err){

melding.innerHTML=`
<div class="infoBox">
<b>❌ Er is iets misgegaan.</b>
</div>
`;

}

btn.disabled=false;

btn.innerHTML="Aanmelden";

}

</script>

</body>
</html>
