<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Brothers Barbershop</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#d4af37;
margin-top:30px;
}

h2{
color:white;
}

.klant{
background:#222;
width:80%;
margin:15px auto;
padding:20px;
border-radius:15px;
font-size:25px;
color:#d4af37;
border:1px solid #d4af37;
}
</style>
</head>

<body>

<h1>TWO BROTHERS BARBERSHOP</h1>
<h2>⏳ Momenteel wachtend</h2>

<div id="lijst"></div>

<script>
fetch("https://script.google.com/macros/s/AKfycbwm368iXU1A423tPvAYxseN5Z8kawIWktoioVTPzqdaHMkwojo-3sSQ_Bf2oeaRWZus/exec")
.then(response => response.json())
.then(data => {

let html = "";

data.forEach((naam,index)=>{
html += `<div class="klant">${index+1}. ${naam}</div>`;
});

document.getElementById("lijst").innerHTML = html;

});
</script>

</body>
</html>
