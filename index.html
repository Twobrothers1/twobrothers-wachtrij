<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Brothers Barbershop</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

h1{
    margin-top:35px;
    color:#d4af37;
}

h2{
    color:white;
    margin-bottom:30px;
}

.klant{
    background:#222;
    border:1px solid #d4af37;
    border-radius:15px;
    width:85%;
    max-width:500px;
    margin:15px auto;
    padding:18px;
    font-size:24px;
    color:#d4af37;
}

.info{
    color:#999;
    margin-top:40px;
}
</style>
</head>

<body>

<h1>TWO BROTHERS BARBERSHOP</h1>
<h2>⏳ Momenteel wachtend</h2>

<div id="lijst">
    <div class="info">Laden...</div>
</div>

<script>

const WEBAPP = "https://script.google.com/macros/s/AKfycbzWtQTXfK01x2hSa4Z4_GBNHA6pIqCbfpGolvXJ0ptnFk16zJGvfuaR2qLDWbu25yEE/exec";

async function laadKlanten(){

    try{

        const response = await fetch(WEBAPP);
        const klanten = await response.json();

        let html = "";

        if(!Array.isArray(klanten) || klanten.length===0){

            html='<div class="klant">Geen wachtenden</div>';

        }else{

            klanten.forEach((naam,index)=>{

                html += `<div class="klant">${index+1}. ${naam}</div>`;

            });

        }

        document.getElementById("lijst").innerHTML = html;

    }catch(err){

        document.getElementById("lijst").innerHTML =
        '<div class="klant">Kan wachtrij niet laden</div>';

        console.error(err);

    }

}

laadKlanten();
setInterval(laadKlanten,10000);

</script>

</body>
</html>
